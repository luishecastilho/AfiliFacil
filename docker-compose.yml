services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nf-facilitator-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: nf_facilitator
      DB_USERNAME: nf_facilitator
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
    depends_on:
      - mysql
      - redis
    networks:
      - nf-facilitator

  nginx:
    image: nginx:alpine
    container_name: nf-facilitator-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - nf-facilitator

  horizon:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nf-facilitator-horizon
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan horizon
    volumes:
      - .:/var/www/html
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: nf_facilitator
      DB_USERNAME: nf_facilitator
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
    depends_on:
      - mysql
      - redis
    networks:
      - nf-facilitator

  mysql:
    image: mysql:8.0
    container_name: nf-facilitator-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: nf_facilitator
      MYSQL_USER: nf_facilitator
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - nf-facilitator-mysql-data:/var/lib/mysql
    networks:
      - nf-facilitator

  redis:
    image: redis:7-alpine
    container_name: nf-facilitator-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - nf-facilitator-redis-data:/data
    networks:
      - nf-facilitator

networks:
  nf-facilitator:
    driver: bridge

volumes:
  nf-facilitator-mysql-data:
  nf-facilitator-redis-data:
